name: Agente Hibrido

on:
  schedule:
    # Ejecución automática cada 10 minutos
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Descarga todo el historial de ramas para poder alternar entre ellas
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Sincronizar memoria histórica y purgar archivos corruptos
        run: |
          # 1. Traer la rama remota de almacenamiento
          git fetch origin datos || true
          
          # 2. Intentar extraer los archivos reales de operaciones previas hacia el espacio de trabajo actual
          git checkout origin/datos -- datos_polymarket/paper_trading/libro_hibrido.csv datos_polymarket/paper_trading/estado_hibrido.json datos_polymarket/paper_trading/bayesian_hibrido.json 2>/dev/null || echo "No se encontró historial en la rama 'datos'. El bot iniciará un registro limpio."
          
          # 3. BLINDAJE CONTRA EMPTYDATAERROR: Si algún archivo quedó en 0 bytes localmente, se elimina por completo.
          # Al ser eliminado, los módulos de Python inicializarán DataFrames nuevos y válidos de forma nativa.
          find . -name "*.csv" -empty -delete 2>/dev/null || true
          find . -name "*.json" -empty -delete 2>/dev/null || true

      - name: Ejecutar agente híbrido
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TZ: America/Guayaquil
        run: python agente_hibrido.py

      - name: Generar dashboard
        env:
          TZ: America/Guayaquil
        run: python generar_dashboard_momentum.py
        
      - name: Guardar resultados en la rama de datos
        run: |
          git config user.email "bot@agente"
          git config user.name "Agente Bot"
          
          # 1. Respaldar los archivos generados en el directorio temporal del Runner (Fuera de Git)
          mkdir -p ${{ runner.temp }}/respaldo/datos_polymarket/paper_trading
          cp datos_polymarket/paper_trading/libro_hibrido.csv ${{ runner.temp }}/respaldo/datos_polymarket/paper_trading/ 2>/dev/null || true
          cp datos_polymarket/paper_trading/estado_hibrido.json ${{ runner.temp }}/respaldo/datos_polymarket/paper_trading/ 2>/dev/null || true
          cp datos_polymarket/paper_trading/bayesian_hibrido.json ${{ runner.temp }}/respaldo/datos_polymarket/paper_trading/ 2>/dev/null || true
          cp datos_polymarket/dashboard_hibrido.html ${{ runner.temp }}/respaldo/datos_polymarket/ 2>/dev/null || true
          cp index.html ${{ runner.temp }}/respaldo/ 2>/dev/null || true
          
          # 2. ⚡ ESCUDO DE LIMPIEZA CRÍTICO: Purgar el árbol de Git para permitir el checkout
          git reset --hard HEAD
          git clean -fd
          
          # 3. Traer la rama de datos e intercambiar sin bloqueos
          git fetch origin datos || true
          git checkout datos
          
          # 4. Restaurar los archivos del ciclo encima de la rama 'datos'
          mkdir -p datos_polymarket/paper_trading
          cp -r ${{ runner.temp }}/respaldo/* .
          
          # 5. Confirmar cambios y empujar la actualización exclusivamente a la rama 'datos'
          git add -A
          git diff --staged --quiet || git commit -m "ciclo GHA $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git datos
      
