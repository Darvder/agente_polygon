name: Agente Hibrido

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar agente híbrido
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TZ: America/Guayaquil
        run: python agente_hibrido.py

      - name: Generar dashboard
        env:
          TZ: America/Guayaquil
        run: python generar_dashboard_momentum.py

      - name: Guardar resultados
        run: |
          git config user.email "bot@agente"
          git config user.name "Agente Bot"
          git add -A
          git diff --staged --quiet || git commit -m "ciclo $(date +'%Y-%m-%d %H:%M')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
