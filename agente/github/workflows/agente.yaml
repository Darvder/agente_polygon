\f0\fs24 \cf0 name: Agente Momentum\
\
on:\
  schedule:\
    - cron: '*/15 * * * *'\
  workflow_dispatch:\
\
jobs:\
  run:\
    runs-on: ubuntu-latest\
    steps:\
      - uses: actions/checkout@v3\
\
      - uses: actions/setup-python@v4\
        with:\
          python-version: '3.11'\
\
      - name: Instalar dependencias\
        run: pip install -r requirements.txt\
\
      - name: Ejecutar agente\
        env:\
          GROQ_API_KEY: $\{\{ secrets.GROQ_API_KEY \}\}\
          NEWS_API_KEY: $\{\{ secrets.NEWS_API_KEY \}\}\
        run: python agente_momentum.py\
\
      - name: Guardar resultados\
        run: |\
          git config user.email "bot@agente"\
          git config user.name "Agente Bot"\
          git add -A\
          git diff --staged --quiet || git commit -m "ciclo $(date +'%Y-%m-%d %H:%M')"\
          git push }